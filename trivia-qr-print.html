<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPop Demon Hunters Trivia — Print QR Sheets</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  /* ── SCREEN STYLES ────────────────────────────── */
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f5f5f5;
    padding: 24px;
  }

  .screen-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .screen-header h1 {
    font-family: 'Bebas Neue'; font-size: 28px; letter-spacing: 2px; color: #1A3A2A;
  }
  .screen-header p {
    font-size: 13px; color: #666; margin-top: 4px;
  }
  .print-btn {
    display: inline-block;
    margin-top: 12px;
    background: #1A3A2A; color: white;
    border: none; border-radius: 6px;
    padding: 10px 28px;
    font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: 2px;
    cursor: pointer;
  }
  .print-btn:hover { background: #2D5A3D; }

  /* ── PRINT GRID ───────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 800px;
    margin: 0 auto;
  }

  /* ── CARD ─────────────────────────────────────── */
  .card {
    background: #080B12;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    aspect-ratio: 3.5 / 2;
    display: flex;
    flex-direction: row;
    align-items: stretch;
  }

  /* Left accent bar — magenta to cyan gradient */
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0; width: 4px;
    background: linear-gradient(180deg, #E8006F, #00E5D4);
  }

  /* Background glow */
  .card::after {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 60% at 15% 30%, rgba(232,0,111,0.18), transparent),
      radial-gradient(ellipse 50% 50% at 85% 70%, rgba(0,229,212,0.12), transparent);
    pointer-events: none;
  }

  .card-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 20px 16px 20px 22px;
    position: relative;
    z-index: 1;
  }

  .card-eyebrow {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #00E5D4;
    margin-bottom: 6px;
  }

  .card-title-demon {
    font-family: 'Bebas Neue';
    font-size: 32px;
    line-height: 0.92;
    color: #F0EBF8;
    letter-spacing: 1px;
    display: block;
  }
  .card-title-hunters {
    font-family: 'Bebas Neue';
    font-size: 32px;
    line-height: 0.92;
    letter-spacing: 1px;
    display: block;
    background: linear-gradient(90deg, #E8006F, #00E5D4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .card-subtitle {
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(240,235,248,0.45);
    margin-top: 5px;
    text-transform: uppercase;
  }

  .card-divider {
    width: 32px; height: 1px;
    background: linear-gradient(90deg, #E8006F, #00E5D4);
    margin: 10px 0;
    opacity: 0.6;
  }

  .card-instruction {
    font-size: 11px;
    font-weight: 600;
    color: #F0EBF8;
    line-height: 1.4;
    margin-bottom: 4px;
  }
  .card-sub {
    font-size: 9px;
    color: rgba(240,235,248,0.45);
    letter-spacing: 0.5px;
  }

  .card-venue {
    margin-top: 10px;
    font-family: 'DM Mono';
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #C9A84C;
  }

  .card-right {
    width: 130px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px;
    background: rgba(255,255,255,0.03);
    border-left: 1px solid rgba(240,235,248,0.07);
    position: relative;
    z-index: 1;
    gap: 8px;
  }

  .qr-wrap {
    background: white;
    border-radius: 8px;
    padding: 6px;
    width: 100px; height: 100px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .qr-wrap canvas,
  .qr-wrap img {
    width: 88px !important;
    height: 88px !important;
  }

  .scan-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #E8006F;
    text-align: center;
  }
  .no-app-label {
    font-size: 8px;
    color: rgba(240,235,248,0.35);
    text-align: center;
    letter-spacing: 0.5px;
  }

  /* ── PRINT STYLES ─────────────────────────────── */
  @media print {
    body {
      background: white;
      padding: 12px;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .screen-header { display: none; }
    .grid {
      gap: 12px;
      max-width: 100%;
    }
    .card { border-radius: 8px; }
    /* Cut guides */
    .grid {
      border: 1px dashed #ccc;
      padding: 8px;
    }
    .card {
      break-inside: avoid;
    }
  }
</style>
</head>
<body>

<div class="screen-header">
  <h1>KPop Demon Hunters Trivia — Table Tents</h1>
  <p>4 cards per sheet · Print, cut, and place at each table or spot at the bar</p>
  <div id="statusMsg" style="margin-top:10px;font-size:13px;color:#888;">Generating QR codes…</div>
  <button class="print-btn" id="printBtn" onclick="window.print()" style="display:none;margin-top:12px;">🖨 Print This Page</button>
</div>

<div class="grid" id="cardGrid">
  <!-- Cards injected by JS -->
</div>

<script>
const PLAY_URL = 'https://clubos-trivia-ballantyne.vercel.app/play.html';
const NUM_CARDS = 4;

function buildCard(index) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-left">
      <div class="card-eyebrow">Trivia Night · June 9, 2026</div>
      <span class="card-title-demon">DEMON</span>
      <span class="card-title-hunters">HUNTERS</span>
      <div class="card-subtitle">K · P · O · P &nbsp; E D I T I O N</div>
      <div class="card-divider"></div>
      <div class="card-instruction">Scan to join &amp; submit your answers</div>
      <div class="card-sub">No app needed · Works on any phone</div>
      <div class="card-venue">Ballantyne CC · The Cabana</div>
    </div>
    <div class="card-right">
      <div class="qr-wrap" id="qr-${index}"></div>
      <div class="scan-label">Scan to Play</div>
      <div class="no-app-label">No app required</div>
    </div>
  `;
  return card;
}

const grid = document.getElementById('cardGrid');
let generated = 0;

function onQRReady() {
  generated++;
  document.getElementById('statusMsg').textContent = `Generating QR codes… ${generated} of ${NUM_CARDS}`;
  if (generated === NUM_CARDS) {
    document.getElementById('statusMsg').textContent = '✅ All QR codes ready — safe to print';
    document.getElementById('statusMsg').style.color = '#2D7A4F';
    document.getElementById('printBtn').style.display = 'inline-block';
  }
}

for (let i = 0; i < NUM_CARDS; i++) {
  const card = buildCard(i);
  grid.appendChild(card);

  // Stagger generation slightly to avoid race, confirm each one completes
  setTimeout(() => {
    const qr = new QRCode(document.getElementById(`qr-${i}`), {
      text: PLAY_URL,
      width: 88,
      height: 88,
      colorDark: '#080B12',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    // QRCode library is synchronous — by the time this line runs, it's rendered
    onQRReady();
  }, 300 * i);
}
</script>

</body>
</html>
